<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lektor AI</title>
    <style>
        body { background-color: #1a1b1e; color: #c1c2c5; font-family: sans-serif; display: flex; justify-content: center; margin-top: 50px; }
        .container { background-color: #25262b; padding: 20px; border-radius: 8px; width: 650px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: white; margin-top: 0; font-size: 16px;}
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #141517; border: 1px solid #373a40; color: white; border-radius: 4px; box-sizing: border-box; }
        
        .dir-list { border: 1px solid #373a40; border-radius: 4px; max-height: 400px; overflow-y: auto; background: #1a1b1e; margin-bottom: 15px; }
        .dir-item { padding: 8px 12px; cursor: pointer; border-bottom: 1px solid #2c2e33; display: flex; align-items: center; font-weight: bold;}
        .dir-item:hover { background-color: #2c2e33; }
        .dir-item.back { color: #4dabf7; }
        
        .file-item { display: flex; align-items: center; padding: 6px 12px; border-bottom: 1px solid #2c2e33;}
        .file-item:hover { background-color: #25262b; }
        .file-item label { cursor: pointer; margin-left: 10px; word-break: break-all; width: 100%;}
        .file-item input[type="checkbox"] { transform: scale(1.2); cursor: pointer; margin: 0; }
        
        .file-type-mkv { color: #fcc419; }
        .file-type-srt { color: #20c997; }

        .btn-group { display: flex; gap: 10px; margin-bottom: 15px;}
        .btn { border: none; padding: 12px; border-radius: 4px; cursor: pointer; font-weight: bold; flex: 1;}
        .btn-start { background-color: #2f9e44; color: white; }
        .btn-start:hover { background-color: #2b8a3e; }
        .btn-start:disabled { background-color: #2c2e33; cursor: not-allowed; color: #868e96;}
        
        .btn-delete { background-color: #e03131; color: white; }
        .btn-delete:hover { background-color: #c92a2a; }

        .status-box { background: #141517; border: 1px solid #373a40; padding: 10px; border-radius: 4px; font-family: monospace; height: 20px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        
        .controls { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px;}
        .controls a { color: #4dabf7; cursor: pointer; text-decoration: none;}
        .controls a:hover { text-decoration: underline;}
    </style>
</head>
<body>
    <div class="container">
        <h2>Wybierz pliki do wygenerowania lektora (Wymagany plik VIDEO i SRT):</h2>
        <input type="text" id="path-input" readonly>

        <div class="controls">
            <a onclick="selectAll(true)">Zaznacz wszystkie</a>
            <a onclick="selectAll(false)">Odznacz wszystkie</a>
        </div>

        <div class="dir-list" id="dir-list">
        </div>

        <div class="btn-group">
            <button class="btn btn-delete" onclick="deleteSelected()">🗑️ Usuń zaznaczone pliki</button>
            <button class="btn btn-start" id="btn-start" onclick="startProcessing()">🚀 Generuj Lektora</button>
        </div>
        
        <div class="status-box" id="status-box">IDLE</div>
    </div>

    <script>
        let currentPath = "";
        let allFilesData = [];

        function loadDir(path) {
            fetch('/api/browse?path=' + encodeURIComponent(path))
                .then(r => r.json())
                .then(data => {
                    currentPath = data.current;
                    document.getElementById('path-input').value = currentPath;
                    allFilesData = data.files;

                    let html = '';
                    if (data.current !== "/" && data.current !== "/mnt") {
                        html += `<div class="dir-item back" onclick="loadDir('${data.parent.replace(/\\/g, '\\\\')}')">⬆️ [Wstecz do folderu nadrzędnego]</div>`;
                    }

                    data.dirs.forEach(d => {
                        html += `<div class="dir-item" onclick="loadDir('${d.path.replace(/\\/g, '\\\\')}')">📁 ${d.name}</div>`;
                    });

                    data.files.forEach(f => {
                        let colorClass = f.name.endsWith('.srt') ? 'file-type-srt' : 'file-type-mkv';
                        html += `
                        <div class="file-item">
                            <input type="checkbox" class="file-checkbox" value="${f.path}" id="${f.path}">
                            <label for="${f.path}" class="${colorClass}">📄 ${f.name}</label>
                        </div>`;
                    });

                    document.getElementById('dir-list').innerHTML = html;
                });
        }

        function selectAll(state) {
            document.querySelectorAll('.file-checkbox').forEach(cb => cb.checked = state);
        }

        function deleteSelected() {
            let selectedFiles = Array.from(document.querySelectorAll('.file-checkbox:checked')).map(cb => cb.value);
            if (selectedFiles.length === 0) {
                alert("Zaznacz z listy pliki, które chcesz usunąć!");
                return;
            }
            if (confirm(`Uwaga! Czy na pewno chcesz całkowicie usunąć z dysku ${selectedFiles.length} plików?`)) {
                fetch('/api/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({files: selectedFiles})
                }).then(() => loadDir(currentPath));
            }
        }

        function startProcessing() {
            let selectedVideos = [];
            document.querySelectorAll('.file-checkbox:checked').forEach(cb => {
                let val = cb.value;
                if (val.endsWith('.mkv') || val.endsWith('.mp4') || val.endsWith('.avi')) {
                    selectedVideos.push(val);
                }
            });

            if (selectedVideos.length === 0) {
                alert("Najpierw zaznacz plik WIDEO, dla którego chcesz wygenerować polskiego lektora.");
                return;
            }

            let pairs = [];
            for (let vid of selectedVideos) {
                let base = vid.substring(0, vid.lastIndexOf('.'));
                // Szuka pasujących napisów
                let srtMatch = allFilesData.find(f => (f.path === base + '.srt' || f.path === base + '.pl.srt'));
                
                if (srtMatch) {
                    pairs.push({video: vid, srt: srtMatch.path});
                } else {
                    alert(`Brak napisów (.srt) dla pliku wideo:\n${vid.split('/').pop()}\n\nZadbaj by plik wideo i napisy miały identyczną nazwę!`);
                    return; 
                }
            }

            fetch('/api/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({pairs: pairs})
            });
        }

        function updateStatus() {
            fetch('/api/status')
                .then(r => r.json())
                .then(data => {
                    document.getElementById('status-box').innerText = data.output;
                    document.getElementById('btn-start').disabled = data.is_processing;
                    
                    if(data.is_processing) {
                        document.getElementById('btn-start').innerText = "⏳ Przetwarzanie lektora AI...";
                    } else {
                        document.getElementById('btn-start').innerText = "🚀 Generuj Lektora";
                    }
                }).catch(() => {});
        }

        loadDir('/mnt/media/filmy');
        setInterval(updateStatus, 1500);
    </script>
</body>
</html>
