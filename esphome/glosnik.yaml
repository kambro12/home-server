esphome:
  name: glosnik-kuchnia
  friendly_name: Głośnik Kuchnia
  comment: Głośnik stereo do Music Assistant na ESP32-S3-N16R8
  on_boot:
    priority: -100
    then:
      - delay: 20s
      - speaker.volume_set:
          id: i2s_speaker
          volume: 25%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  ignore_not_found: false

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 10dB
  ap:
    ssid: "Glosnik Kuchnia Fallback"
    password: "glosnik123"
  use_address: 192.168.1.184
captive_portal:

api:
  encryption:
    key: "MFqzNgrQFA7W1A1GbOUibmmI9nA1Sa2+wj2uOvC699Y="

ota:
  - platform: esphome
    password: "e8440394be9362972e5f98a332499f11"

logger:
  level: INFO

network:
  enable_high_performance: true

i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO11
  i2s_bclk_pin: GPIO12

speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO13
    channel: stereo
    bits_per_sample: 16bit
    sample_rate: 44100

  - platform: mixer
    id: mixer_spk
    output_speaker: i2s_speaker
    source_speakers:
      - id: announcement_speaker
      - id: media_speaker

media_player:
  - platform: speaker
    id: mp
    name: "Głośnik Kuchnia"
#    codec_support_enabled: NEEDED
    buffer_size: 1500000
    task_stack_in_psram: true
    announcement_pipeline:
      speaker: announcement_speaker
      sample_rate: 44100
      format: FLAC
      num_channels: 2
    media_pipeline:
      speaker: media_speaker
      sample_rate: 44100
      format: FLAC
      num_channels: 2

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode: INPUT_PULLDOWN
    name: "Kuchnia Obecność"
    device_class: occupancy
    filters:
      - delayed_off: 5s

button:
  - platform: restart
    name: "Głośnik Kuchnia restart"