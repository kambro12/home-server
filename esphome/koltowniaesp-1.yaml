    name: "Restart Controller"
    icon: "mdi:restart"

  - platform: template
    name: "Query Status"
    icon: "mdi:refresh"
    on_press:
      - lambda: |-
          uint8_t query_a3[] = {0x01, 0xA3, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum_a3 = 0;
          for(int i = 0; i < 7; i++) checksum_a3 += query_a3[i];
          query_a3[7] = checksum_a3;
          id(mppt_uart).write_array(query_a3, 8);
          id(mppt_uart).flush();
      - delay: 500ms
      - lambda: |-
          uint8_t query_a2[] = {0x01, 0xA2, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum_a2 = 0;
          for(int i = 0; i < 7; i++) checksum_a2 += query_a2[i];
          query_a2[7] = checksum_a2;
          id(mppt_uart).write_array(query_a2, 8);
          id(mppt_uart).flush();
