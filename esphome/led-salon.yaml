esphome:
  name: sterownik-led
  friendly_name: Sterownik LED
  comment: Sterowanie oswietleniem LED w salonie (Okna i TV)

esp8266:
  board: d1_mini

logger:

api:
  encryption:
    key: "DM2UKH7jZuYPrSxhszFbkSxdXedyhpFB2FY4LwAksvQ="

ota:
  - platform: esphome
    password: "c45d4e05540948e6d0ed7e97328cd8b1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Salon LED Fallback Hotspot"
    password: "R8N9yFkbDL6T"
  use_address: 192.168.1.160
captive_portal:

output:
  # Sekcja OKNA - MOSFET Gate na D1
  - platform: esp8266_pwm
    pin: D1
    id: led_pwm_okna
    frequency: 1000 Hz

  # Sekcja TV - MOSFET Gate na D2
  - platform: esp8266_pwm
    pin: D2
    id: led_pwm_tv
    frequency: 1000 Hz

light:
  - platform: monochromatic
    output: led_pwm_okna
    name: "Okna - LED"
    id: okna_tasma
    default_transition_length: 2s
    restore_mode: RESTORE_DEFAULT_OFF 

  - platform: monochromatic
    output: led_pwm_tv
    name: "TV - LED"
    id: tv_tasma
    default_transition_length: 2s
    restore_mode: RESTORE_DEFAULT_OFF 

binary_sensor:
  # Przełącznik OKNA na D5
  - platform: gpio
    pin:
      number: D5
      mode: INPUT_PULLUP
      inverted: true
    name: "Przełącznik Okna - LED"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - light.turn_on:
            id: okna_tasma
            transition_length: 2s
    on_release:
      then:
        - light.turn_off:
            id: okna_tasma
            transition_length: 2s

  # Przełącznik TV na D6
  - platform: gpio
    pin:
      number: D6
      mode: INPUT_PULLUP
      inverted: true
    name: "Przełącznik TV - LED"
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - light.turn_on:
            id: tv_tasma
            transition_length: 2s
    on_release:
      then:
        - light.turn_off:
            id: tv_tasma
            transition_length: 2s