uart:
  id: mppt_uart
  tx_pin: ${tx_pin}
  rx_pin: ${rx_pin}
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1
  rx_buffer_size: 256

globals:
  - id: mppt_address
    type: uint8_t
    initial_value: '0x01'

  - id: pv_voltage_raw
    type: float
    initial_value: '0.0'

  - id: battery_voltage_raw
    type: float
    initial_value: '0.0'

  - id: charging_current_raw
    type: float
    initial_value: '0.0'

  - id: internal_temp_raw
    type: float
    initial_value: '0.0'

  - id: external_temp_raw
    type: float
    initial_value: '0.0'

  - id: operation_state_raw
    type: uint8_t
    initial_value: '0'

  - id: charge_state_raw
    type: uint8_t
    initial_value: '0'

  - id: control_state_raw
    type: uint8_t
    initial_value: '0'

  - id: charging_enabled_state
    type: bool
    restore_value: yes
    initial_value: 'true'

  - id: max_charge_current_raw
    type: float
    restore_value: yes
    initial_value: '100.0'

  - id: nominal_voltage_raw
    type: float
    initial_value: '48.0'

  - id: float_voltage_raw
    type: float
    initial_value: '54.4'

interval:
  - interval: 3s
    then:
      - lambda: |-
          uint8_t query[] = {0x01, 0xA3, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += query[i];
          query[7] = checksum;
          id(mppt_uart).write_array(query, 8);
          id(mppt_uart).flush();

  - interval: 30s
    then:
      - lambda: |-
          uint8_t query[] = {0x01, 0xA2, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += query[i];
          query[7] = checksum;
          id(mppt_uart).write_array(query, 8);
          id(mppt_uart).flush();

  - interval: 100ms
    then:
      - lambda: |-
          if (!id(mppt_uart).available()) return;

          std::vector<uint8_t> data;
          while (id(mppt_uart).available()) {
            uint8_t byte;
            if (id(mppt_uart).read_byte(&byte)) data.push_back(byte);
          }

          if (data.size() == 0) return;
          if (data.size() < 8 || data[0] != 0x01) return;

          uint8_t cmd = data[1];

          if (cmd == 0xA3 && data.size() >= 21) {
            uint8_t checksum = 0;
            for (size_t i = 0; i < 20; i++) checksum += data[i];
            if (checksum != data[20]) {
              ESP_LOGW("MPPT", "0xA3 Checksum FAIL: calc=0x%02X recv=0x%02X", checksum, data[20]);
              return;
            }

            id(operation_state_raw) = data[3];
            id(charge_state_raw) = data[4];
            id(control_state_raw) = data[5];

            uint16_t pv = (data[6] << 8) | data[7];
            id(pv_voltage_raw) = pv / 10.0f;

            uint16_t batt = (data[8] << 8) | data[9];
            id(battery_voltage_raw) = batt / 100.0f;

            uint16_t curr = (data[10] << 8) | data[11];
            id(charging_current_raw) = curr / 100.0f;

            uint16_t temp1 = (data[12] << 8) | data[13];
            id(internal_temp_raw) = temp1 / 10.0f;

            uint16_t temp2 = (data[16] << 8) | data[17];
            id(external_temp_raw) = temp2 / 10.0f;

            bool charging_prohibited = (data[4] & 0x40) != 0;
            id(charging_enabled_state) = !charging_prohibited;

            if (id(charging_enable_switch).state != id(charging_enabled_state)) {
              id(charging_enable_switch).publish_state(id(charging_enabled_state));
            }

            ESP_LOGI("MPPT", "0xA3: PV:%.1fV Batt:%.2fV Curr:%.2fA Temp:%.1fC Charging:%s",
                     id(pv_voltage_raw), id(battery_voltage_raw),
                     id(charging_current_raw), id(internal_temp_raw),
                     id(charging_enabled_state) ? "ON" : "OFF");
          }
          else if (cmd == 0xA2 && data.size() >= 26) {
            uint8_t checksum = 0;
            for (size_t i = 0; i < 25; i++) checksum += data[i];
            if (checksum != data[25]) {
              ESP_LOGW("MPPT", "0xA2 Checksum FAIL: calc=0x%02X recv=0x%02X", checksum, data[25]);
              return;
            }

            uint16_t nominal_v = (data[9] << 8) | data[10];
            id(nominal_voltage_raw) = nominal_v / 100.0f;

            uint16_t float_v = (data[13] << 8) | data[14];
            id(float_voltage_raw) = float_v / 100.0f;

            uint16_t max_curr = (data[19] << 8) | data[20];
            id(max_charge_current_raw) = max_curr / 100.0f;

            auto call = id(charging_current_limit).make_call();
            call.set_value(id(max_charge_current_raw));
            call.perform();

            ESP_LOGI("MPPT", "0xA2: Nominal:%.2fV Float:%.2fV MaxCurr:%.2fA",
                     id(nominal_voltage_raw), id(float_voltage_raw), id(max_charge_current_raw));
          }
          else if (cmd == 0xDB && data.size() >= 8) {
            ESP_LOGI("MPPT", "0xDB: Command echo received (setting acknowledged)");
          }

sensor:
  - platform: dallas_temp
    address: 0xc10000006ac79928
    name: "Temperatura pieca"
    filters:
      - offset: 1
    update_interval: 10s

  - platform: dallas_temp
    address: 0x560000006a034b28
    name: "Temperatura na zewn"
    update_interval: 10s

  - platform: dallas_temp
    address: 0xd30000006ac26f28
    name: "Temperatura wody"
    update_interval: 10s

  - platform: template
    name: "PV Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 1
    device_class: voltage
    state_class: measurement
    update_interval: 3s
    lambda: return id(pv_voltage_raw);
    filters:
      - filter_out: 0.0

  - platform: template
    name: "Battery Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    state_class: measurement
    update_interval: 3s
    lambda: return id(battery_voltage_raw);
    filters:
      - filter_out: 0.0

  - platform: template
    name: "Charging Current"
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: current
    state_class: measurement
    update_interval: 3s
    lambda: return id(charging_current_raw);

  - platform: template
    name: "Internal Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 3s
    lambda: return id(internal_temp_raw);
    filters:
      - filter_out: 0.0

  - platform: template
    name: "External Temperature"
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    device_class: temperature
    state_class: measurement
    update_interval: 3s
    lambda: return id(external_temp_raw);

  - platform: template
    name: "Charging Power"
    unit_of_measurement: "W"
    accuracy_decimals: 1
    device_class: power
    state_class: measurement
    update_interval: 3s
    lambda: return id(battery_voltage_raw) * id(charging_current_raw);

  - platform: template
    name: "Nominal Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    update_interval: 30s
    lambda: return id(nominal_voltage_raw);

  - platform: template
    name: "Float Voltage"
    unit_of_measurement: "V"
    accuracy_decimals: 2
    device_class: voltage
    update_interval: 30s
    lambda: return id(float_voltage_raw);

  - platform: template
    name: "Max Charge Current Limit"
    unit_of_measurement: "A"
    accuracy_decimals: 2
    device_class: current
    update_interval: 30s
    lambda: return id(max_charge_current_raw);

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

binary_sensor:
  - platform: template
    name: "Operation Error"
    device_class: problem
    lambda: return (id(operation_state_raw) & 0x01) != 0;

  - platform: template
    name: "Battery Protection"
    device_class: problem
    lambda: return (id(operation_state_raw) & 0x02) != 0;

  - platform: template
    name: "Fan Fault"
    device_class: problem
    lambda: return (id(operation_state_raw) & 0x04) != 0;

  - platform: template
    name: "Over Temperature"
    device_class: problem
    lambda: return (id(operation_state_raw) & 0x08) != 0;

  - platform: template
    name: "DC Output Short"
    device_class: problem
    lambda: return (id(operation_state_raw) & 0x10) != 0;

  - platform: template
    name: "Charging Active"
    device_class: running
    lambda: return (id(charge_state_raw) & 0x01) != 0;

  - platform: template
    name: "Bulk Charging"
    lambda: return (id(charge_state_raw) & 0x02) != 0;

  - platform: template
    name: "MPPT Tracking"
    lambda: return (id(charge_state_raw) & 0x04) != 0;

  - platform: template
    name: "Float Charging"
    lambda: return (id(charge_state_raw) & 0x08) != 0;

  - platform: template
    name: "PV Overvoltage"
    device_class: problem
    lambda: return (id(charge_state_raw) & 0x80) != 0;

text_sensor:
  - platform: template
    name: "Charging Mode"
    update_interval: 3s
    lambda: |-
      uint8_t state = id(charge_state_raw);
      if (!(state & 0x01)) return {"Not Charging"};
      if (state & 0x02) return {"Bulk Charging"};
      if (state & 0x04) return {"MPPT Tracking"};
      if (state & 0x08) return {"Float Charging"};
      return {"Charging"};

  - platform: template
    name: "System Status"
    update_interval: 3s
    lambda: |-
      uint8_t state = id(operation_state_raw);
      if (state == 0) return {"Normal"};
      if (state & 0x01) return {"Error: Battery Auto-ID Failed"};
      if (state & 0x02) return {"Warning: Battery Over-discharge"};
      if (state & 0x04) return {"Error: Fan Fault"};
      if (state & 0x08) return {"Error: Over Temperature"};
      if (state & 0x10) return {"Error: DC Output Short"};
      return {"Warning: Check Status"};

switch:
  - platform: gpio
    inverted: true
    name: "Relay 1"
    pin: GPIO21

  - platform: gpio
    inverted: true
    name: "Relay 2"
    pin: GPIO26

  - platform: gpio
    inverted: true
    name: "Relay 3"
    pin: GPIO27

  - platform: gpio
    inverted: true
    name: "Relay 5"
    pin: GPIO25

  - platform: gpio
    inverted: true
    id: relay1
    pin: GPIO33
    restore_mode: ALWAYS_OFF
    name: "Gate Switch"
    icon: "mdi:gate-open"
    device_class: switch
    on_turn_on:
      - delay: 500ms
      - switch.turn_off: relay1

  - platform: gpio
    inverted: true
    id: relay2
    pin: GPIO19
    restore_mode: ALWAYS_OFF
    name: "Entry Gate Switch"
    icon: "mdi:gate-open"
    device_class: switch
    on_turn_on:
      - delay: 200ms
      - switch.turn_off: relay2

  - platform: template
    name: "Charging Enable"
    id: charging_enable_switch
    icon: "mdi:battery-charging"
    optimistic: false
    restore_mode: RESTORE_DEFAULT_ON
    lambda: return id(charging_enabled_state);
    turn_on_action:
      - lambda: |-
          ESP_LOGI("MPPT", "Sending: Enable Charging");
          uint8_t cmd[] = {0x01, 0xC0, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t cs = 0;
          for(int i = 0; i < 7; i++) cs += cmd[i];
          cmd[7] = cs;
          id(mppt_uart).write_array(cmd, 8);
          id(mppt_uart).flush();
      - delay: 500ms
      - lambda: |-
          uint8_t query[] = {0x01, 0xA3, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += query[i];
          query[7] = checksum;
          id(mppt_uart).write_array(query, 8);
          id(mppt_uart).flush();
    turn_off_action:
      - lambda: |-
          ESP_LOGI("MPPT", "Sending: Disable Charging");
          uint8_t cmd[] = {0x01, 0xC0, 0x02, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t cs = 0;
          for(int i = 0; i < 7; i++) cs += cmd[i];
          cmd[7] = cs;
          id(mppt_uart).write_array(cmd, 8);
          id(mppt_uart).flush();
      - delay: 500ms
      - lambda: |-
          uint8_t query[] = {0x01, 0xA3, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += query[i];
          query[7] = checksum;
          id(mppt_uart).write_array(query, 8);
          id(mppt_uart).flush();

number:
  - platform: template
    name: "Charging Current Limit"
    id: charging_current_limit
    icon: "mdi:current-dc"
    unit_of_measurement: "A"
    min_value: 0
    max_value: 100
    step: 1
    mode: box
    optimistic: false
    lambda: return id(max_charge_current_raw);
    set_action:
      - lambda: |-
          uint16_t current_value = (uint16_t)(x * 100);
          ESP_LOGI("MPPT", "Setting charging current limit: %.0fA (0x%04X)", x, current_value);
          uint8_t cmd[] = {
            0x01,
            0xDB,
            0x25,
            0x00,
            0x00,
            (uint8_t)(current_value >> 8),
            (uint8_t)(current_value & 0xFF),
            0x00
          };
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += cmd[i];
          cmd[7] = checksum;
          id(mppt_uart).write_array(cmd, 8);
          id(mppt_uart).flush();
          id(max_charge_current_raw) = x;
      - delay: 500ms
      - lambda: |-
          uint8_t query[] = {0x01, 0xA2, 0x01, 0x00, 0x00, 0x00, 0x00, 0x00};
          uint8_t checksum = 0;
          for(int i = 0; i < 7; i++) checksum += query[i];
          query[7] = checksum;
          id(mppt_uart).write_array(query, 8);
          id(mppt_uart).flush();

button:
