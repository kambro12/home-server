light:
  - platform: esp32_rmt_led_strip
    id: lancuch_bazowy
    internal: true
    rgb_order: RGB
    chipset: WS2812
    pin: GPIO16
    num_leds: 200

  - platform: partition
    name: "Girlanda Całość"
    id: girlanda_calosc
    segments:
      - id: lancuch_bazowy
        from: 0
        to: 199
    effects:
      - addressable_twinkle:
          name: "Gwiaździste Niebo"
          twinkle_probability: 25%
          progress_interval: 20ms

      - addressable_rainbow:
          name: "Tęcza"
          speed: 50
          width: 200

      - addressable_lambda:
          name: "Efekt Świecy"
          update_interval: 50ms
          lambda: |-
            Color base = Color(255, 120, 20);
            for (int i = 0; i < it.size(); i++) {
              if (random_uint32() % 200 < 50) {
                uint8_t br = 100 + (random_uint32() % 155);
                it[i] = Color(
                  (uint8_t)(base.r * br / 255),
                  (uint8_t)(base.g * br / 255),
                  (uint8_t)(base.b * br / 255)
                );
              } else {
                it[i] = base;
              }
            }

      - pulse:
          name: "Pulsowanie"
          transition_length: 1500ms
          update_interval: 2000ms
          min_brightness: 5%
          max_brightness: 100%

      - addressable_lambda:
          name: "Eksplozja od Środka"
          update_interval: 30ms
          lambda: |-
            static int pos = 0;
            static bool forward = true;
            const int TAIL = 12;
            const int STRIP_LEN = 40;
            const int NUM_STRIPS = 5;
            const int CENTER = 20;
            Color c = current_color;
            it.all() = Color::BLACK;
            for (int s = 0; s < NUM_STRIPS; s++) {
              int offset = s * STRIP_LEN;
              int head_left  = offset + (CENTER - 1) - pos;
              int head_right = offset + CENTER + pos;
              for (int t = 0; t <= TAIL; t++) {
                uint8_t brightness = (uint8_t)(255 * (TAIL - t) / TAIL);
                Color tc = Color(
                  (uint8_t)(c.r * brightness / 255),
                  (uint8_t)(c.g * brightness / 255),
                  (uint8_t)(c.b * brightness / 255)
                );
                int li = head_left + t;
                if (li >= offset && li < offset + CENTER)
                  it[li] = tc;
                int ri = head_right - t;
                if (ri >= offset + CENTER && ri < offset + STRIP_LEN)
                  it[ri] = tc;
              }
            }
            if (forward) {
              pos++;
              if (pos >= CENTER) { pos = CENTER - 1; forward = false; }
            } else {
              pos--;
              if (pos < 0) { pos = 0; forward = true; }
            }

  - platform: partition
    name: "Girlanda Pasek 1"
    id: girlanda_pasek1
    segments:
      - id: lancuch_bazowy
        from: 0
        to: 39

  - platform: partition
    name: "Girlanda Pasek 2"
    id: girlanda_pasek2
    segments:
      - id: lancuch_bazowy
        from: 40
        to: 79

  - platform: partition
    name: "Girlanda Pasek 3"
    id: girlanda_pasek3
    segments:
      - id: lancuch_bazowy
        from: 80
        to: 119

  - platform: partition
    name: "Girlanda Pasek 4"
    id: girlanda_pasek4
    segments:
      - id: lancuch_bazowy
        from: 120
        to: 159

  - platform: partition
    name: "Girlanda Pasek 5"
    id: girlanda_pasek5
    segments:
      - id: lancuch_bazowy
        from: 160
        to: 199