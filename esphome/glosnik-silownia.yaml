esphome:
  name: glosnik-silownia
  friendly_name: "Głośnik siłownia"
  on_boot:
    priority: -100
    then:
      - delay: 2s
      - switch.turn_on: amp_standby
      - delay: 18s
      - speaker.volume_set:
          id: i2s_speaker
          volume: 25%

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: octal
  ignore_not_found: false

wifi:
  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      bssid: 70:4F:57:00:41:FA
      priority: 10
    - ssid: !secret wifi_ssid
      password: !secret wifi_password
      priority: 1
  fast_connect: false
  on_connect:
    then:
      - logger.log: "WiFi połączony"
  use_address: 192.168.1.132
sensor:
  - platform: wifi_signal
    name: "WiFi Signal Siłownia"
    id: wifi_rssi
    update_interval: 30s
    on_value:
      then:
        - if:
            condition:
              lambda: 'return x < -75.0;'
            then:
              - logger.log: "Słaby sygnał WiFi, restartuję..."
              - button.press: restart_button
api:
  encryption:
    key: "MFqzNgrQFA7W1A1GbOUibmmI9nA1Sa2+wj2uOvC699Y="
  reboot_timeout: 10min

ota:
  - platform: esphome
    password: "e8440394be9362972e5f98a332499f11"

logger:
  level: DEBUG

network:
  enable_high_performance: true

# I2S Audio Bus Configuration
i2s_audio:
  id: i2s_bus
  i2s_lrclk_pin: GPIO11
  i2s_bclk_pin: GPIO12
  i2s_mclk_pin: GPIO1 # Dodane pod Twoje połączenie SCK

# Speaker Configuration - dokładnie jak w Twojej kuchni
speaker:
  - platform: i2s_audio
    id: i2s_speaker
    i2s_audio_id: i2s_bus
    dac_type: external
    i2s_dout_pin: GPIO13
    channel: stereo
    bits_per_sample: 16bit
    sample_rate: 44100

  - platform: mixer
    id: mixer_spk
    output_speaker: i2s_speaker
    source_speakers:
      - id: announcement_speaker
      - id: media_speaker

# Media Player Configuration - dokładnie jak w Twojej kuchni
media_player:
  - platform: speaker
    id: mp
    name: "Głośnik siłownia"
    codec_support_enabled: NEEDED
    buffer_size: 1500000
    task_stack_in_psram: true
    announcement_pipeline:
      speaker: announcement_speaker
      sample_rate: 44100
      format: NONE
      num_channels: 2
    media_pipeline:
      speaker: media_speaker
      sample_rate: 44100
      format: FLAC
      num_channels: 2

# Sterowanie Standby wzmacniacza (Anti-Pop)
switch:
  - platform: gpio
    pin: GPIO5
    name: "Wzmacniacz Power"
    id: amp_standby
    restore_mode: ALWAYS_OFF

button:
  - platform: restart
    name: "Głośnik siłownia restart"
    id: restart_button