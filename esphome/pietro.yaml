esphome:
  name: pietro
  friendly_name: Pietro
  comment: Sterowanie oswietleniem i przewietrzaniem piętra

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      ignore_efuse_mac_crc: false
      minimum_chip_revision: "3.1"
      sram1_as_iram: true
logger:
  level: info

safe_mode:
  num_attempts: 5
  reboot_timeout: 3min

api:
  encryption:
    key: "MFqzNgrQFA7W1A1GbOUibmmI9bA1Sa2+wj2uOvC699Y="
  reboot_timeout: 5min

ota:
  - platform: esphome
    password: "e8440394be9362972e5f58a332499f11"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none
  ap:
    ssid: "Pietro Fallback"
    password: "password2023"
  use_address: 192.168.1.37
captive_portal:

switch:
  - platform: gpio
    inverted: true
    name: "wentylator"
    entity_category: "config"
    id: wentylator
    pin: GPIO23
  - platform: gpio
    inverted: true
    name: "LED"
    pin: GPIO04
    restore_mode: ALWAYS_ON
  - platform: gpio
    inverted: true
    name: "Przewietrzanie pietra"
    pin: GPIO14
  - platform: gpio
    inverted: true
    name: "Relay 4"
    pin: GPIO27
    restore_mode: ALWAYS_ON
  - platform: gpio
    inverted: true
    name: "Relay 5"
    pin: GPIO26
  - platform: gpio
    inverted: true
    name: "Relay 6"
    pin: GPIO25
  - platform: gpio
    inverted: true
    name: "Relay 7"
    pin: GPIO33
  - platform: gpio
    inverted: true
    name: "Relay 8"
    pin: GPIO32

button:
  - platform: restart
    id: restart_button
    name: "ESPHome Piętro restart"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO18
      mode: INPUT_PULLDOWN
    name: "Czujnik obecności - Cel"
    id: czujnik_obecnosci_cel
    device_class: occupancy
    filters:
      - delayed_off: 10s
    on_press:
      then:
        - light.turn_on:
            id: tasma_led_lazienka
            brightness: 20%
            transition_length: 3s
    on_release:
      then:
        - light.turn_off:
            id: tasma_led_lazienka
            transition_length: 2s
  - platform: gpio
    pin:
      number: GPIO16
      mode: INPUT_PULLDOWN
    name: wlacznik_wentylatora
    filters:
      - delayed_on: 50ms
      - delayed_off: 50ms
    on_press:
      then:
        - switch.toggle: wentylator

sensor:
  - platform: dht
    pin: GPIO22
    model: DHT11
    temperature:
      name: "Temperatura sypialnia"
      id: temp_sypialnia
      filters:
        - lambda: |-
            static unsigned long last_valid = 0;
            if (isnan(x)) {
              if (millis() - last_valid > 600000) return x;
              return {};
            }
            last_valid = millis();
            return x;
    humidity:
      name: "Wilgotność sypialnia"
      id: hum_sypialnia
      filters:
        - lambda: |-
            static unsigned long last_valid = 0;
            if (isnan(x)) {
              if (millis() - last_valid > 600000) return x;
              return {};
            }
            last_valid = millis();
            return x;
    update_interval: 60s

output:
  - platform: ledc
    pin: GPIO17
    id: mono_output
    frequency: 1000 Hz

light:
  - platform: monochromatic
    name: "Taśma LED Łazienka"
    id: tasma_led_lazienka
    output: mono_output